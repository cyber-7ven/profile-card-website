<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miracle Amajama — Full-Stack Software Engineer</title>
  <script src="src/output.css"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:     '#0b1526',
            'navy-2': '#111f38',
            'navy-3': '#162340',
            accent:   '#f59e0b',
            'accent-hover': '#d97706',
            gold:     '#e8a020',
          },
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        },
        },
    };
    </script>
    <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
    />
    <style>
    /* ── Scrollbar ── */
    * { scrollbar-width: thin; scrollbar-color: #f59e0b #0b1526; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 4px; }

    .profile-ring {
        background: conic-gradient(from 0deg, #f59e0b, #ea580c, #fbbf24, #ea580c, #f59e0b);
        padding: 3px;
        border-radius: 9999px;
        display: inline-block;
    }

    .accordion-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .accordion-body.open { max-height: 600px; }
    .accordion-chevron { transition: transform 0.3s ease; }
    .accordion-chevron.open { transform: rotate(180deg); }

    .project-card {
        transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .project-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }

    .filter-tab {
        transition: all 0.2s ease;
        cursor: pointer;
    }
    .filter-tab.active {
        background: #f59e0b;
        color: #0b1526;
        font-weight: 700;
    }
    .filter-tab:not(.active):hover {
        border-color: #f59e0b;
        color: #f59e0b;
    }

    .stat-blue  { background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%); }
    .stat-amber { background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); }
    .stat-rose  { background: linear-gradient(135deg, #ffe4e6 0%, #fecdd3 100%); }

    .btn-send {
        background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }
    .btn-send:hover { background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%); }

    .btn-resume {
        background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
    }
    .btn-resume:hover { background: linear-gradient(135deg, #d97706 0%, #c2410c 100%); }

    .screenshot-placeholder {
        width: 100%; height: 190px;
        display: flex; align-items: center; justify-content: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        letter-spacing: 0.05em;
    }

    .tech-badge {
        transition: transform 0.18s ease, background 0.18s ease;
    }
    .tech-badge:hover { transform: translateY(-2px); }

    /* Smooth scroll for right panel */
    #right-panel { scroll-behavior: smooth; }

    /* Hide mobile sidebar toggle on desktop */
    @media (min-width: 1024px) {
        #sidebar-toggle { display: none; }
        #left-panel { display: flex !important; }
    }
    </style>
</head>
